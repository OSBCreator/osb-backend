<!DOCTYPE html>
<html>
<head>
  <title>OSB Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0a0a0a;
      color: white;
      padding: 20px;
    }
    h1 { color: red; }
    .stats {
      margin: 20px 0;
      font-size: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }
    th { background: #111; text-align: left; }
    .high { color: red; font-weight: bold; }
    .low { color: green; }
    input {
      padding: 10px;
      margin-bottom: 15px;
      width: 100%;
      background: #111;
      color: white;
      border: 1px solid #333;
    }
  </style>
</head>
<body>

<h1>🛡 OSB Intelligence Dashboard</h1>

<div class="stats" id="stats"></div>

<input type="text" id="search" placeholder="Search user..." />

<table>
  <thead>
    <tr>
      <th>User</th>
      <th>Score</th>
      <th>Risk</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
let allData = [];

function render(data) {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  data.forEach(item => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.user}</td>
      <td>${item.score}</td>
      <td class="${item.risk}">${item.risk}</td>
      <td>${new Date(item.createdAt).toLocaleString()}</td>
    `;

    table.appendChild(row);
  });
}

fetch("http://localhost:5000/api/data")
  .then(res => res.json())
  .then(data => {
    allData = data;

    const total = data.length;
    const high = data.filter(d => d.risk === "high").length;
    const low = data.filter(d => d.risk === "low").length;

    document.getElementById("stats").innerHTML =
      `Total: ${total} | High Risk: ${high} | Low Risk: ${low}`;

    render(data);
  });

document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  const filtered = allData.filter(d =>
    d.user.toLowerCase().includes(value)
  );
  render(filtered);
});
</script>

</body>
</html>
